<!-- FUNDADOR.HTML - Profile Header Section usando sistema global -->
<!-- Reemplazar toda la sección profile-header -->

<section class="section profile-header">
    <div class="container">
        <!-- Layout Principal usando grid global -->
        <div class="grid-2-1-1 fade-in">
            <!-- Imagen del perfil -->
            <div style="text-align: center;">
                <img src="media/images/fundador/jose-manuel-cartes.jpg" 
                     alt="José Manuel Cartes Urzúa"
                     style="width: 200px; height: 200px; border-radius: 50%; object-fit: cover; box-shadow: var(--shadow-light);">
            </div>
            
            <!-- Información del perfil -->
            <div>
                <h1 style="font-family: var(--font-title); font-size: clamp(2.5rem, 4vw, 3.5rem); color: var(--primary-dark); margin-bottom: 0.5rem; letter-spacing: var(--title-letter-spacing); line-height: 1.2;">José Manuel Cartes Urzúa</h1>
                <h2 style="font-size: clamp(1.3rem, 2.5vw, 1.8rem); color: var(--primary); font-weight: 600; margin-bottom: 0.5rem;">Fundador Preuniversitario JMC</h2>
                <p style="font-size: 1.1rem; color: var(--black); margin-bottom: 2rem; opacity: 0.8;">Ingeniero Civil UC • Profesor • Montañista</p>
            </div>
        </div>
        
        <!-- Botones de contacto usando grid global 3-1-1 -->
        <div class="grid-3-1-1" style="margin-top: 2rem;">
            <a href="mailto:jcartes@preujmc.cl" 
               style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255, 255, 255, 0.7); border-radius: 10px; transition: all 0.3s ease; text-decoration: none; color: inherit;"
               onmouseover="this.style.background='rgba(65, 182, 230, 0.1)'; this.style.transform='translateY(-3px)'"
               onmouseout="this.style.background='rgba(255, 255, 255, 0.7)'; this.style.transform='translateY(0)'">
                <span class="material-symbols-rounded" style="font-size: 1.5rem; color: var(--primary);">email</span>
                <div>
                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); display: block; margin-bottom: 0.3rem;">Email</span>
                    <span style="font-size: 1rem; color: var(--black);">jcartes@preujmc.cl</span>
                </div>
            </a>
            
            <a href="https://instagram.com/josemanuelcartes" target="_blank"
               style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255, 255, 255, 0.7); border-radius: 10px; transition: all 0.3s ease; text-decoration: none; color: inherit;"
               onmouseover="this.style.background='rgba(65, 182, 230, 0.1)'; this.style.transform='translateY(-3px)'"
               onmouseout="this.style.background='rgba(255, 255, 255, 0.7)'; this.style.transform='translateY(0)'">
                <img src="media/icons/Instagram_Glyph_Gradient.png" alt="Instagram" style="width: 1.5rem; height: 1.5rem; min-width: 1.5rem;">
                <div>
                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); display: block; margin-bottom: 0.3rem;">Instagram</span>
                    <span style="font-size: 1rem; color: var(--black);">@josemanuelcartes</span>
                </div>
            </a>
            
            <a href="https://www.linkedin.com/in/josé-manuel-cartes-urzúa-10b35711" target="_blank"
               style="display: flex; align-items: center; gap: 1rem; padding: 1rem; background: rgba(255, 255, 255, 0.7); border-radius: 10px; transition: all 0.3s ease; text-decoration: none; color: inherit;"
               onmouseover="this.style.background='rgba(65, 182, 230, 0.1)'; this.style.transform='translateY(-3px)'"
               onmouseout="this.style.background='rgba(255, 255, 255, 0.7)'; this.style.transform='translateY(0)'">
                <img src="media/icons/LI-In-Bug.png" alt="LinkedIn" style="width: 1.5rem; height: 1.5rem; min-width: 1.5rem;">
                <div>
                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--primary-dark); display: block; margin-bottom: 0.3rem;">LinkedIn</span>
                    <span style="font-size: 1rem; color: var(--black);">José Manuel Cartes</span>
                </div>
            </a>
        </div>
    </div>
</section>

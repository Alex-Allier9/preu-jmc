<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Local - Desarrollo | Preuniversitario JMC</title>
    
    <style>
        /* CSS BÁSICO PARA DESARROLLO LOCAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #101820;
            background: #f4f4f4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .gallery-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .gallery-main-title {
            font-size: 2.5rem;
            color: #165C7D;
            margin-bottom: 1rem;
        }
        
        .gallery-subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
        }
        
        .gallery-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #41B6E6;
            background: transparent;
            color: #41B6E6;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active,
        .filter-btn:hover {
            background: #41B6E6;
            color: white;
        }
        
        .expeditions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .expedition-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(16, 24, 32, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .expedition-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(16, 24, 32, 0.15);
        }
        
        .expedition-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1rem;
        }
        
        .expedition-content {
            padding: 1.5rem;
        }
        
        .expedition-title {
            font-size: 1.3rem;
            color: #165C7D;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .expedition-description {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .expedition-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .expedition-difficulty {
            color: #41B6E6;
            font-weight: 600;
        }
        
        .expedition-altitude {
            color: #666;
        }
        
        .expedition-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .new-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #F4DA40;
            color: #101820;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .achievement-badges {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .achievement-badge {
            background: rgba(65, 182, 230, 0.9);
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .error-message {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(16, 24, 32, 0.1);
        }
        
        .btn-primary {
            background: #41B6E6;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        
        .btn-primary:hover {
            background: #2ba3d0;
        }
        
        /* MODAL SIMPLE PARA DESARROLLO */
        .simple-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            padding: 2rem;
        }
        
        .simple-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #41B6E6;
            color: white;
            border: none;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .expeditions-grid {
                grid-template-columns: 1fr;
            }
            
            .gallery-filters {
                flex-wrap: wrap;
            }
            
            .expedition-meta {
                flex-direction: column;
                gap: 0.5rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gallery-header">
            <h1 class="gallery-main-title">Expediciones Montañísticas</h1>
            <p class="gallery-subtitle">Sistema de desarrollo local - Sin requests HTTP</p>
            
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="cerros">Cerros</button>
                <button class="filter-btn" data-filter="volcanes">Volcanes</button>
                <button class="filter-btn" data-filter="sierras">Sierras</button>
            </div>
        </div>

        <div class="expeditions-grid" id="expeditions-grid">
            <!-- Las cards se generan dinámicamente -->
        </div>
    </div>

    <!-- Modal simple para desarrollo -->
    <div class="simple-modal" id="simple-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modal-body">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <script>
        /* ======================================

        // DATOS LOCALES EMBEBIDOS (sin necesidad de JSON externo)
        const LOCAL_EXPEDITIONS = {

                    { icon: '❄️', name: 'Ascensos Invernales', description: 'Múltiples ascensos en invierno' }
                ],
                photos: [
                    'el-plomo_0001.jpg',

                    'el-plomo_0004.jpg',

                    'el-plomo_0006.jpg',
                    'el-plomo_0007.jpg',
                    'el-plomo_0008.jpg'
                ]
            },
            'volcan-san-jose': {
                id: 'volcan-san-jose',
                name: 'Volcán San José',
                shortDescription: 'Volcán activo en la frontera chileno-argentina. Desafío moderado con paisajes volcánicos únicos.',
                category: 'volcanes',
                altitude: 5856,
                altitudeUnit: 'msnm',
                difficulty: { grade: 'PD', name: 'Poco Difícil' },
                type: 'Volcán',
                ascents: 1,
                photoCount: 3,
                featured: false,
                status: 'active',
                lastUpdate: '2024-10-08T09:20:00Z',
                achievements: [
                    { icon: '🚀', name: 'Récord Ascenso', description: '5h 48min tiempo récord' },
                    { icon: '🏅', name: 'Récord Global', description: '9h 37min ida y vuelta' }
                ],
                photos: [

            },
            'marmolejo': {

                difficulty: { grade: 'AD', name: 'Bastante Difícil' },

                featured: false,
                status: 'active',
                lastUpdate: '2024-09-15T16:45:00Z',
                achievements: [
                    { icon: '⏱️', name: 'Récord Ascenso', description: '11h 51min tiempo récord' },
                    { icon: '💪', name: 'Persistencia', description: '3 ascensos exitosos' }
                ],
                photos: [
                    'marmolejo_0001.jpg',
                    'marmolejo_0002.jpg',
                    'marmolejo_0003.jpg',
                    'marmolejo_0004.jpg'
                ]
            },
            'ojos-salado': {
                id: 'ojos-salado',
                name: 'Ojos del Salado',
                shortDescription: 'El volcán activo más alto del mundo. Un desafío extremo por altitud, condiciones áridas y dificultad técnica.',
                category: 'volcanes',
                altitude: 6893,
                altitudeUnit: 'msnm',
                difficulty: { grade: 'PD', name: 'Poco Difícil' },
                type: 'Volcán',
                ascents: 1,
                photoCount: 5,
                featured: true,
                status: 'active',
                lastUpdate: '2024-08-22T11:10:00Z',
                achievements: [
                    { icon: '🌍', name: 'Volcán Más Alto', description: 'Volcán activo más alto del mundo' },
                    { icon: '🏆', name: 'Segunda Cumbre América', description: 'Segunda montaña más alta de América' }
                ],
                photos: [
                    'ojos-salado_0001.jpg',
                    'ojos-salado_0002.jpg',

                    'ojos-salado_0005.jpg'
                ]
            },
            'sierras-santiago': {
                id: 'sierras-santiago',
                name: 'Sierras de Santiago',
                shortDescription: 'Conjunto montañoso cercano a Santiago, ideal para entrenamiento y aclimatación. Rutas variadas y acceso fácil.',
                category: 'sierras',
                altitude: 2200,
                altitudeUnit: 'msnm',
                difficulty: { grade: 'F', name: 'Fácil' },
                type: 'Sierra',
                ascents: 25,
                photoCount: 10,
                featured: false,
                status: 'active',
                lastUpdate: '2024-12-01T08:30:00Z',
                achievements: [
                    { icon: '💪', name: 'Campo Entrenamiento', description: 'Base para preparación física' },
                    { icon: '🗺️', name: 'Múltiples Rutas', description: 'Exploración de rutas variadas' }
                ],
                photos: [
                    'sierras-santiago_0001.jpg',
                    'sierras-santiago_0002.jpg',
                    'sierras-santiago_0003.jpg',
                    'sierras-santiago_0004.jpg',
                    'sierras-santiago_0005.jpg',
                    'sierras-santiago_0006.jpg',
                    'sierras-santiago_0007.jpg',
                    'sierras-santiago_0008.jpg',
                    'sierras-santiago_0009.jpg',
                    'sierras-santiago_0010.jpg'
                ]
            }
        };
        
        // VARIABLES GLOBALES
        let currentFilter = 'all';
        let currentExpeditions = Object.values(LOCAL_EXPEDITIONS);
        
        /* ======================================
           FUNCIONES PRINCIPALES
           ====================================== */
        
        // Inicialización
        function initLocalGallery() {
            console.log('🏔️ Inicializando galería local...');
            renderExpeditions();
            setupEvents();
            console.log('✅ Galería local lista');
        }
        
        // Renderizar expediciones
        function renderExpeditions() {
            const grid = document.getElementById('expeditions-grid');
            const expeditions = getFilteredExpeditions();
            
            if (expeditions.length === 0) {
                grid.innerHTML = `
                    <div class="error-message">
                        <h3>No hay expediciones para mostrar</h3>
                        <p>Selecciona otro filtro o verifica la configuración.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = expeditions.map(expedition => createExpeditionCard(expedition)).join('');
            
            // Agregar eventos de click a las cards
            const cards = grid.querySelectorAll('.expedition-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    const expeditionId = card.dataset.expedition;
                    openExpeditionModal(expeditionId);
                });
            });
            
            console.log(`📊 ${expeditions.length} expediciones renderizadas`);
        }
        
        // Crear card de expedición
        function createExpeditionCard(expedition) {
            const isNew = isNewExpedition(expedition);
            const achievementBadges = expedition.achievements ? 
                expedition.achievements.slice(0, 2).map(achievement => 
                    `<span class="achievement-badge">${achievement.icon}</span>`
                ).join('') : '';
            
            return `
                <div class="expedition-card" data-expedition="${expedition.id}" data-category="${expedition.category}">
                    ${isNew ? '<div class="new-badge">NUEVO</div>' : ''}
                    ${achievementBadges ? `<div class="achievement-badges">${achievementBadges}</div>` : ''}
                    
                    <div class="expedition-image">
                        📸 ${expedition.name}
                        <br><small>(Imagen: ${expedition.id}_cover.jpg)</small>
                    </div>
                    
                    <div class="expedition-content">
                        <h3 class="expedition-title">${expedition.name}</h3>
                        <p class="expedition-description">${expedition.shortDescription}</p>
                        
                        <div class="expedition-meta">
                            <div class="expedition-difficulty">
                                ${getDifficultyIcon(expedition.type)} ${expedition.difficulty.grade} - ${expedition.difficulty.name}
                            </div>
                            <span class="expedition-altitude">${expedition.altitude.toLocaleString()} ${expedition.altitudeUnit}</span>
                        </div>
                        
                        <div class="expedition-stats">
                            <div>📷 ${expedition.photoCount} fotos</div>
                            <div>📈 ${expedition.ascents} ascensos</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Obtener expediciones filtradas
        function getFilteredExpeditions() {
            let expeditions = Object.values(LOCAL_EXPEDITIONS)
                .filter(exp => exp.status === 'active');
            
            if (currentFilter && currentFilter !== 'all') {
                expeditions = expeditions.filter(exp => exp.category === currentFilter);
            }
            
            // Ordenar por destacados primero
            expeditions.sort((a, b) => {
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return b.altitude - a.altitude;
            });
            
            return expeditions;
        }
        
        // Configurar eventos
        function setupEvents() {
            // Filtros
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                button.addEventListener('click', (e) => {
                    // Actualizar botones activos
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // Aplicar filtro
                    currentFilter = button.dataset.filter;
                    renderExpeditions();
                    
                    console.log(`🔍 Filtro aplicado: ${currentFilter}`);
                });
            });
            
            // Cerrar modal con Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
            
            // Cerrar modal al hacer click fuera
            document.getElementById('simple-modal').addEventListener('click', (e) => {
                if (e.target.id === 'simple-modal') {
                    closeModal();
                }
            });
        }
        
        // Abrir modal de expedición
        function openExpeditionModal(expeditionId) {
            const expedition = LOCAL_EXPEDITIONS[expeditionId];
            if (!expedition) return;
            
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <h2>${expedition.name}</h2>
                <p><strong>Ubicación:</strong> ${expedition.type} - ${expedition.altitude.toLocaleString()} ${expedition.altitudeUnit}</p>
                <p><strong>Dificultad:</strong> ${expedition.difficulty.grade} (${expedition.difficulty.name})</p>
                <p><strong>Ascensos realizados:</strong> ${expedition.ascents}</p>
                <p><strong>Fotos disponibles:</strong> ${expedition.photoCount}</p>
                
                <h3>Descripción:</h3>
                <p>${expedition.shortDescription}</p>
                
                ${expedition.achievements ? `
                    <h3>Logros destacados:</h3>
                    <ul>
                        ${expedition.achievements.map(achievement => 
                            `<li>${achievement.icon} <strong>${achievement.name}:</strong> ${achievement.description}</li>`
                        ).join('')}
                    </ul>
                ` : ''}
                
                <h3>Fotos:</h3>
                <p>📁 Carpeta: media/images/fundador/gallery/${expedition.id}/</p>
                <ul>
                    ${expedition.photos.map(photo => `<li>📸 ${photo}</li>`).join('')}
                </ul>
                
                <p><small><strong>Última actualización:</strong> ${new Date(expedition.lastUpdate).toLocaleDateString()}</small></p>
            `;
            
            document.getElementById('simple-modal').classList.add('active');
            console.log(`🖼️ Modal abierto: ${expeditionId}`);
        }
        
        // Cerrar modal
        function closeModal() {
            document.getElementById('simple-modal').classList.remove('active');
            console.log('🚪 Modal cerrado');
        }
        
        // Verificar si expedición es nueva
        function isNewExpedition(expedition) {
            if (!expedition.lastUpdate) return false;
            
            const updateDate = new Date(expedition.lastUpdate);
            const now = new Date();
            const daysDiff = (now - updateDate) / (1000 * 60 * 60 * 24);
            
            return daysDiff <= 21; // 21 días
        }
        
        // Obtener icono de dificultad
        function getDifficultyIcon(type) {
            const icons = {
                'Cerro': '⛰️',
                'Volcán': '🌋',
                'Sierra': '🏔️'
            };
            return icons[type] || '🥾';
        }
        
        /* ======================================
           INICIALIZACIÓN AUTOMÁTICA
           ====================================== */
        
        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📦 Galería Local para Desarrollo - CARGADA');
            console.log('🔧 Sin requests HTTP - Datos embebidos');
            console.log('💻 Ideal para desarrollo local sin servidor');
            
            initLocalGallery();
        });
        
        // Hacer funciones disponibles globalmente para debugging
        window.LOCAL_EXPEDITIONS = LOCAL_EXPEDITIONS;
        window.openExpeditionModal = openExpeditionModal;
        window.closeModal = closeModal;
        
        console.log('🏔️ Sistema de Galería Local - Ready!');
    </script>
</body>
</html>

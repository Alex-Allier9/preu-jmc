# ======================================
# CONFIGURACIÓN NGINX - PÁGINA 404
# ======================================

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;
    root /path/to/your/website;
    index index.html;

    # Configuración de página 404 personalizada
    error_page 404 /404.html;
    
    # Asegurar que la página 404 se sirva correctamente
    location = /404.html {
        internal;
    }

    # Configuración principal de ubicaciones
    location / {
        try_files $uri $uri/ =404;
    }

    # Redirecciones para URLs comunes
    # ======================================
    
    location = /inicio { return 301 /index.html; }
    location = /home { return 301 /index.html; }
    location = /about { return 301 /nosotros.html; }
    location = /founder { return 301 /fundador.html; }
    location = /services { return 301 /servicios.html; }
    location = /testimonials { return 301 /testimonios.html; }
    location = /contact { return 301 /contacto.html; }

    # Redirecciones para versiones sin extensión
    location = /nosotros { return 301 /nosotros.html; }
    location = /fundador { return 301 /fundador.html; }
    location = /servicios { return 301 /servicios.html; }
    location = /testimonios { return 301 /testimonios.html; }
    location = /contacto { return 301 /contacto.html; }

    # Configuración de cache para recursos estáticos
    # ======================================
    
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configuración de compresión
    # ======================================
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/javascript
        application/json;

    # Headers de seguridad
    # ======================================
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proteger archivos sensibles
    # ======================================
    
    location ~ /\. {
        deny all;
    }

    location ~* \.(bak|backup|old|tmp)$ {
        deny all;
    }

    # Configuración SSL (opcional)
    # ======================================
    
    # listen 443 ssl http2;
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;
    
    # # Redirigir HTTP a HTTPS
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }
}

# Configuración adicional para subdominios www
# ======================================

server {
    listen 80;
    server_name www.tu-dominio.com;
    return 301 http://tu-dominio.com$request_uri;
}